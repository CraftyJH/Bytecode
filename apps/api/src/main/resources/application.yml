spring:
  application:
    name: bytecode-api

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/bytecode_dev}
    username: ${DATABASE_USER:bytecode}
    password: ${DATABASE_PASSWORD:bytecode}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  security:
    oauth2:
      resourceserver:
        jwt:
          # Supabase exposes a JWKS endpoint at this path for your project
          # Replace <project-ref> with your Supabase project reference
          jwk-set-uri: ${SUPABASE_JWKS_URI:https://<project-ref>.supabase.co/auth/v1/keys}
          # Alternatively, use the symmetric secret for HS256 tokens:
          # secret: ${SUPABASE_JWT_SECRET:}

server:
  port: ${PORT:8080}
  error:
    include-message: on_param
    include-binding-errors: on_param

judge0:
  api-url: https://judge0-ce.p.rapidapi.com
  api-host: judge0-ce.p.rapidapi.com
  api-key: ${JUDGE0_API_KEY:3ed5ccf394mshdaecbd73442901fp167076jsn4a0f49eddef7}

internal:
  billing:
    sync-token: ${BYTECODE_INTERNAL_BILLING_SYNC_TOKEN:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    dev.bytecode: DEBUG
    org.springframework.security: WARN
    org.flywaydb: INFO
