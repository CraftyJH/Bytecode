spring:
  application:
    name: bytecode-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/bytecode_dev}
    username: ${DATABASE_USER:bytecode}
    password: ${DATABASE_PASSWORD:bytecode}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  security:
    # Disable default security auto-config until Sprint 2 (auth)
    # In production this is replaced with JWT + Supabase
    user:
      password: ${SPRING_SECURITY_USER_PASSWORD:disabled}

server:
  port: ${PORT:8080}
  error:
    include-message: on_param
    include-binding-errors: on_param

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    dev.bytecode: DEBUG
    org.springframework.security: WARN
