name: Android Build

on:
  push:
    branches:
      - main
      - "cursor/**"
    paths:
      - "apps/android/**"
      - ".github/workflows/android-build.yml"
  pull_request:
    branches:
      - main
    paths:
      - "apps/android/**"
      - ".github/workflows/android-build.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    env:
      SIGNING_STORE_BASE64: ${{ secrets.ANDROID_SIGNING_STORE_BASE64 }}
      SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
      SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
      SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
    defaults:
      run:
        working-directory: apps/android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Inject Android app env
        env:
          SUPABASE_URL: ${{ secrets.ANDROID_SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.ANDROID_SUPABASE_PUBLISHABLE_KEY }}
          BYTECODE_API_URL: ${{ secrets.ANDROID_BYTECODE_API_URL }}
          WEB_BASE_URL: ${{ secrets.ANDROID_WEB_BASE_URL }}
        run: |
          {
            echo "SUPABASE_URL=${SUPABASE_URL:-https://example.supabase.co}"
            echo "SUPABASE_PUBLISHABLE_KEY=${SUPABASE_PUBLISHABLE_KEY:-placeholder}"
            echo "BYTECODE_API_URL=${BYTECODE_API_URL:-https://bytecode-web.craftyjhs-projects.vercel.app}"
            echo "WEB_BASE_URL=${WEB_BASE_URL:-https://bytecode-web.craftyjhs-projects.vercel.app}"
          } >> "${GITHUB_ENV}"

      - name: Prepare optional release keystore
        if: ${{ env.SIGNING_STORE_BASE64 != '' }}
        run: |
          mkdir -p app/keystore
          echo "${SIGNING_STORE_BASE64}" | base64 --decode > app/keystore/release.jks
          {
            echo "ANDROID_SIGNING_STORE_FILE=app/keystore/release.jks"
            echo "ANDROID_SIGNING_STORE_PASSWORD=${SIGNING_STORE_PASSWORD}"
            echo "ANDROID_SIGNING_KEY_ALIAS=${SIGNING_KEY_ALIAS}"
            echo "ANDROID_SIGNING_KEY_PASSWORD=${SIGNING_KEY_PASSWORD}"
          } >> "${GITHUB_ENV}"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Lint and unit tests
        run: ./gradlew --stacktrace :app:lintDebug :app:testDebugUnitTest

      - name: Build debug and release APKs
        run: ./gradlew --stacktrace :app:assembleDebug :app:assembleRelease

      - name: Prepare release APK filename for public download
        run: cp app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/bytecode-android-release.apk

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: bytecode-android-debug-apk
          path: apps/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: bytecode-android-release-apk
          path: apps/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Publish latest Android APK release asset
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: Android Latest APK
          body: |
            Latest Android APK build from `main`.
            Install directly on Android via the attached `bytecode-android-release.apk`.
          files: apps/android/app/build/outputs/apk/release/bytecode-android-release.apk
          overwrite_files: true
