name: Android Build

on:
  push:
    branches:
      - main
      - "cursor/**"
    paths:
      - "apps/android/**"
      - ".github/workflows/android-build.yml"
  pull_request:
    branches:
      - main
    paths:
      - "apps/android/**"
      - ".github/workflows/android-build.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Inject Android app env
        env:
          SUPABASE_URL: ${{ secrets.ANDROID_SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.ANDROID_SUPABASE_PUBLISHABLE_KEY }}
          BYTECODE_API_URL: ${{ secrets.ANDROID_BYTECODE_API_URL }}
          WEB_BASE_URL: ${{ secrets.ANDROID_WEB_BASE_URL }}
        run: |
          {
            echo "SUPABASE_URL=${SUPABASE_URL:-https://example.supabase.co}"
            echo "SUPABASE_PUBLISHABLE_KEY=${SUPABASE_PUBLISHABLE_KEY:-placeholder}"
            echo "BYTECODE_API_URL=${BYTECODE_API_URL:-https://bytecode-web.craftyjhs-projects.vercel.app}"
            echo "WEB_BASE_URL=${WEB_BASE_URL:-https://bytecode-web.craftyjhs-projects.vercel.app}"
          } >> "${GITHUB_ENV}"

      - name: Validate Gradle wrapper
        uses: gradle/wrapper-validation-action@v2

      - name: Build debug APK
        run: ./gradlew --stacktrace assembleDebug

      - name: Build release APK
        run: ./gradlew --stacktrace assembleRelease

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: bytecode-android-debug-apk
          path: apps/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: bytecode-android-release-apk
          path: apps/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
